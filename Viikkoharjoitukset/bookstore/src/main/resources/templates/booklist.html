<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<link type="text/css" rel="stylesheet" href="/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" />
	<head>
		<title>Booklist</title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	</head>
	<body>
        <h2>Hello <span sec:authentication="name"></span>!</h2>
        <form th:action="@{/logout}" method="post">
	        <input type="submit" value="Sign Out" class="btn btn-sm btn-danger"/>
        </form>
        <h1>Booklist</h1>
            <table class="table table-striped">
                <tr>
                    <th>Author</th>
                    <th>Title</th>
                    <th>ISBN</th>
                    <th>Year</th>
                    <th>Price</th>
                    <th>Category</th>
                </tr>
                <tr th:each = "book : ${books}">
                    <td th:text="${book.author}"></td>
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.isbn}"></td>
                    <td th:text="${book.publicationYear}"></td>
                    <td th:text="${book.price}"></td>
                    <td th:text="${book.category.name}"></td>
                    <td sec:authorize="hasAuthority('ADMIN')"><a th:href="@{/delete/{id}(id=${book.id})}" class="btn btn-danger">Delete</a></td>
                    <td sec:authorize="hasAuthority('ADMIN')"><a th:href="@{/edit/{id}(id=${book.id})}" class="btn btn-info">Edit</a></td>
                </tr>
            </table>
             <a href="/addbook" class="btn btn-success">Add Book</a>
	</body>
</html>
