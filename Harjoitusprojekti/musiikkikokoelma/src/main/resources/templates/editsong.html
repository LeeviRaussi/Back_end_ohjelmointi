<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
	<head>
		<title>Muokkaa kappaletta</title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	</head>
	<body>
        <h1>Muokkaa kappaletta</h1>
        <div>
            <form th:object="${song}" th:action="@{../editsong}" action="#" method="post">
                <label for="id"></label>
                <input type="hidden" id="id" th:field="*{songId}" readonly="readonly"/>
                <div style="clear: both; display: block; height: 10px;"></div>

                <label for="title">Kappale</label>
                <input type="text" id="title" th:field="*{title}" />
                    <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Virhe</div>
                <div style="clear: both; display: block; height: 10px;"></div>

                <label for="artistlist">Artisti</label>
                <select id="artistlist" th:field="*{artist}" class="form-control">
                    <option th:each="artist : ${artists}"
                        th:value="${artist.artistId}"
                        th:text="${artist.name}"></option>
                </select>
                <div style="clear: both; display: block; height: 10px;"></div>

                <label for="releaseYear">Julkaisuvuosi</label>
                <input type="text" id="releaseYear" th:field="*{releaseYear}"/>
                    <div th:if="${#fields.hasErrors('releaseYear')}" th:errors="*{releaseYear}">Virhe</div>
                <div style="clear: both; display: block; height: 10px;"></div>

                <label for="albumlist">Albumi</label>
                <select id="albumlist" th:field="*{album}" class="form-control">
                    <option th:each="album : ${albums}"
                        th:value="${album.albumId}"
                        th:text="${album.title}"></option>
                </select>
                <div style="clear: both; display: block; height: 10px;"></div>

                <label for="length">Pituus (mm:ss)</label>
                <input type="text" id="length" th:field="*{length}" />
                    <div th:if="${#fields.hasErrors('length')}" th:errors="*{length}">Virhe</div>
                <div style="clear: both; display: block; height: 10px;"></div>

                <label for="genrelist">Genre</label>
                <select id="genrelist" th:field="*{genre}" class="form-control">
                    <option th:each="genre : ${genres}"
                        th:value="${genre.genreId}"
                        th:text="${genre.name}"></option>
                </select>
                <div style="clear: both; display: block; height: 10px;"></div>
                <input type="submit" value="Muokkaa"></input>
            </form>
        </div>
	</body>
</html>
