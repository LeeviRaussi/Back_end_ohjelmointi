<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
	<head>
		<title>Muokkaa artistia</title>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	</head>
	<body>
        <h1>Muokkaa artistia</h1>
        <div>
            <form th:object="${artist}" th:action="@{../editartist}" action="#" method="post">
                <label for="id"></label>
                <input type="hidden" id="id" th:field="*{artistId}" readonly="readonly"/>
                <div style="clear: both; display: block; height: 10px;"></div>

                <label for="name">Artisti</label>
                <input type="text" id="name" th:field="*{name}" />
                    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Virhe</div>
                <div style="clear: both; display: block; height: 10px;"></div>

                <label for="foundingYear">Perustamisvuosi</label>
                <input type="text" id="foundingYear" th:field="*{foundingYear}"/>
                    <div th:if="${#fields.hasErrors('foundingYear')}" th:errors="*{foundingYear}">Virhe</div>
                <div style="clear: both; display: block; height: 10px;"></div>

                <label for="albums"></label>
                <input type="hidden" id="albums" th:field="*{albums}" readonly="readonly"/>
                <div style="clear: both; display: block; height: 10px;"></div>

                <label for="songs"></label>
                <input type="hidden" id="songs" th:field="*{songs}" readonly="readonly"/>
                <div style="clear: both; display: block; height: 10px;"></div>
                <input type="submit" value="Muokkaa"></input>
            </form>
        </div>
	</body>
</html>
